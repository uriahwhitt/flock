{% extends "base.html" %}
{% block title %}Create Team — Flock{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="/static/css/teams.css">{% endblock %}
{% block content %}
<div class="create-team-container">
    <h1>Create Team</h1>
    {% if error %}
        <div class="flash flash-error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/teams/create">
        <div class="form-group">
            <label for="name">Team Name</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
            <label for="slug">URL Slug</label>
            <input type="text" id="slug" name="slug" required placeholder="my-team">
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="3"></textarea>
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" name="is_public" value="true" checked>
                Public team
            </label>
        </div>
        <button type="submit" class="btn btn-primary">Create Team</button>
        <a href="/teams" class="btn">Cancel</a>
    </form>
</div>
{% endblock %}
