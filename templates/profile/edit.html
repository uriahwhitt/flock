{% extends "base.html" %}
{% block title %}Edit Profile — Flock{% endblock %}
{% block content %}
<div class="edit-profile-container">
    <h1>Edit Profile</h1>
    <form method="POST" action="/profile/edit" enctype="multipart/form-data">
        <div class="form-group">
            <label for="display_name">Display Name</label>
            <input type="text" id="display_name" name="display_name"
                   value="{{ user.display_name or '' }}">
        </div>
        <div class="form-group">
            <label for="bio">Bio</label>
            <textarea id="bio" name="bio" rows="4">{{ user.bio or '' }}</textarea>
        </div>
        <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" name="location"
                   value="{{ user.location or '' }}">
        </div>
        <div class="form-group">
            <label for="website">Website</label>
            <input type="url" id="website" name="website"
                   value="{{ user.website or '' }}">
        </div>
        <div class="form-group">
            <label for="avatar">Profile Picture</label>
            <input type="file" id="avatar" name="avatar" accept="image/*">
            {% if user.avatar_url %}
                <img src="/{{ user.avatar_url }}" class="avatar-sm" alt="current avatar">
            {% endif %}
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="/profile/{{ user.username }}" class="btn">Cancel</a>
    </form>
</div>
{% endblock %}
